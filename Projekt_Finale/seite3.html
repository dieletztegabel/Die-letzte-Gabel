
<!DOCTYPE html>
<html lang="de">
    <head><meta charset="UTF-8">
    <title>Spielregeln</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body{
            background-color: #C5B9A5;
            background: radial-gradient(circle, #C5B9A5 40%, #cccccc 130%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #2B2620;
            min-height: 100vh;

        }

        h1{
            background-color: #C5B9A5;
            background: radial-gradient(circle, #C5B9A5 40%, #cccccc 130%);
            display: block;
            text-align: center;
            margin: 0;
            padding-top: 40px;
            padding-bottom: 20px;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: clamp(2.5rem, 10vw, 5rem);
            letter-spacing: 3px;
            color: #721c24;
            width: 100%

        }


        .container {
            width: 90%;
            max-width: 800px;
            margin-top:  20px;
            background-color: white;
            display: flex;
            flex-direction: column;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            align-items: center;
        }


        .Spielregeln-Bild{
            width: 100%;
            max-width: 600px;
            height: auto;
            display: block;
            border-radius: 25px;
        
        }

         nav{
             text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;

        }

        nav a{
            display: inline-block;
            color: #9f6236;
            text-decoration: none;
            font-weight: bold;
            margin: 0 10px;
            padding:5px 15px;
            transition: 0.3s;
        }
        nav a:hover {
            color: #80450a;
            text-decoration: underline;
        }

        .form-container {
            background-color: white;
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .form-container h2 {
            font-family: 'Georgia', serif;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: #721c24;
            margin-bottom: 15px;
            text-align: center;
        }

        .form-container p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #2B2620;
        }

        .form-group input[type="text"],
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: sans-serif;
            transition: border-color 0.3s ease;
        }

        .form-group input[type="text"]:focus,
        .form-group textarea:focus {
            border-color: #721c24;
            outline: none;
        }

        .form-container button {
            background-color: #721c24; 
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px; 
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 10px; 
        }

        .form-container button:hover {
            background-color: #5a151b; 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }


    </style>
</head>
<body>
    <h1>Spielregeln</h1>
    <div class="container">
        <img src="Spielregeln1.png" alt="Spielregeln" class="Spielregeln-Bild">
    
    </div>
    <div class="form-container">
        <h2>Dein Verdacht</h2>
        <p>Wer ist der Mörder und warum? Teile uns deinen Tipp mit!</p>
        <form action="#" method="post">
            <div class="form-group">
                <label for="name">Dein Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="verdacht">Dein Verdacht:</label>
                <textarea id="verdacht" name="verdacht" rows="5" required></textarea>
        </div>
        <div class="form-group">
            <label for="beweis">Dein Beweis (optional):</label>
            <input type="text" id="beweis" name="beweis">
        </div>
        <button type="submit">Verdacht absenden</button>
    </form> 
    </div>

    <nav>
        <a href="index.html">Home</a>  
        <a href="seite1.html">Charakter</a> 
        <a href="seite2.html">Outfit</a> 
    </nav>
    <script>
    function sendeVerdacht() {
    const bereich = document.getElementById('form-bereich');

    bereich.innerHTML = `
        <div style="text-align: center; padding: 20px; border: 2px dashed #721c24; border-radius: 15px; background: #fdf2e2;">
            <h3 style="color: #721c24;">🚨 Beweis gesichert!</h3>
            <p>Dein Verdacht wurde im System gespeichert. Die Ermittler melden sich bei dir, falls weitere Fragen bestehen.</p>
            <span style="font-weight: bold; color: #9f6236;">Fallnummer: #4829-K</span>
        </div>
    `;
}
</script>
 </body>
 </html>
