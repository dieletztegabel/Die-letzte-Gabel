
<!DOCTYPE html>
<html lang="de">
    <head><meta charset="UTF-8">
    <title>Spielregeln</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body{
            background-color: #C5B9A5;
            background: radial-gradient(circle, #C5B9A5 40%, #cccccc 130%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #2B2620;
            min-height: 100vh;

        }

        h1{
            background-color: #C5B9A5;
            background: radial-gradient(circle, #C5B9A5 40%, #cccccc 130%);
            display: block;
            text-align: center;
            margin: 0;
            padding-top: 40px;
            padding-bottom: 20px;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: clamp(2.5rem, 10vw, 5rem);
            letter-spacing: 3px;
            color: #721c24;
            width: 100%

        }


        .container {
            width: 90%;
            max-width: 800px;
            margin-top:  20px;
            background-color: white;
            display: flex;
            flex-direction: column;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            align-items: center;
        }


        .Spielregeln-Bild{
            width: 100%;
            max-width: 600px;
            height: auto;
            display: block;
            border-radius: 25px;
        
        }

         nav{
             text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;

        }

        nav a{
            display: inline-block;
            color: #9f6236;
            text-decoration: none;
            font-weight: bold;
            margin: 0 10px;
            padding:5px 15px;
            transition: 0.3s;
        }
        nav a:hover {
            color: #80450a;
            text-decoration: underline;
        }

        .form-container {
            background-color: white;
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
        }



    </style>
</head>
<body>
    <h1>Spielregeln</h1>
    <div class="container">
        <img src="Spielregeln1.png" alt="Spielregeln" class="Spielregeln-Bild">
    
    </div>
    <div class="form-container">
        <h2>Dein Verdacht</h2>
        <p>Wer ist der Mörder und warum? Teile uns deinen Tipp mit!</p>
        <form action="#" method="post">
            <div class="form-group">
                <label for="name">Dein Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="verdacht">Dein Verdacht:</label>
                <textarea id="verdacht" name="verdacht" rows="5" required></textarea>
        </div>
        <div class="form-group">
            <label for="beweis">Dein Beweis (optional):</label>
            <input type="text" id="beweis" name="beweis">
        </div>
        <button type="submit">Verdacht absenden</button>
    </form> 
    </div>

    <nav>
        <a href="index.html">Home</a>  
        <a href="seite1.html">Charakter</a> 
        <a href="seite2.html">Outfit</a> 
    </nav>
 </body>
 </html>
